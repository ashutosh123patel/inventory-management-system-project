<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inventory Management System - Product Dashboard">
  <title>Product Dashboard | Inventory Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.12) 100%),
                  linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
    }

    #root {
      width: 100%;
      min-height: calc(100vh - 72px);
      padding: 2rem 1.5rem;
    }

    /* ----- Enhanced Navigation (visual only, same functionality) ----- */
    nav {
      background: rgba(15, 23, 42, 0.96);
      backdrop-filter: blur(12px);
      padding: 0.9rem 2rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }

    nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      position: relative;
    }

    nav a:hover {
      color: #a78bfa;
      transform: translateY(-1px);
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      transition: width 0.2s ease;
      border-radius: 2px;
    }

    nav a:hover::after {
      width: 100%;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-brand span {
      font-size: 1.6rem;
    }

    .nav-spacer {
      margin-left: auto;
    }

    .logout-btn {
      background: linear-gradient(95deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(220, 38, 38, 0.3);
      letter-spacing: 0.3px;
    }

    .logout-btn:hover {
      background: linear-gradient(95deg, #dc2626, #b91c1c);
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(220, 38, 38, 0.4);
    }

    /* ----- Dashboard Container ----- */
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* welcome banner */
    .welcome-banner {
      background: linear-gradient(115deg, rgba(255,255,255,0.92) 0%, rgba(248,250,255,0.96) 100%);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 1.6rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .welcome-title {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(125deg, #1e293b, #334155);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .welcome-sub {
      color: #475569;
      font-size: 0.95rem;
      border-left: 3px solid #818cf8;
      padding-left: 1rem;
    }

    /* stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
      background: white;
      border-color: #e0e7ff;
    }

    .stat-info h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 0.5rem;
    }

    .stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.2;
    }

    .stat-icon {
      font-size: 2.4rem;
      opacity: 0.7;
    }

    /* ----- PRODUCTS LIST UI - Completely Redesigned, Modern Card Style ----- */
    .products-section {
      margin-top: 0.5rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }

    .section-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #2d3a4e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .product-count-badge {
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      padding: 8px 18px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4338ca;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* Modern product grid layout - beautiful cards instead of plain table */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(203, 213, 225, 0.4);
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 36px -12px rgba(0, 0, 0, 0.15);
      border-color: #c7d2fe;
    }

    /* gradient accent bar */
    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #818cf8, #c084fc, #a78bfa);
    }

    .card-content {
      padding: 1.5rem 1.5rem 1.2rem;
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .product-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.2px;
      background: linear-gradient(135deg, #1e293b, #334155);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      word-break: break-word;
      flex: 1;
    }

    .category-chip {
      background: #f1f5f9;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .product-details {
      margin: 1rem 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
    }

    .price-tag {
      background: #fef9e3;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #b45309;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .price-tag span {
      font-size: 0.8rem;
      font-weight: 500;
      color: #92400e;
    }

    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      padding: 4px 12px;
      border-radius: 60px;
    }

    .stock-badge-modern {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .stock-badge-modern.high {
      color: #15803d;
    }
    .stock-badge-modern.medium {
      color: #b45309;
    }
    .stock-badge-modern.low {
      color: #b91c1c;
    }

    .stock-value {
      font-weight: 800;
      font-size: 1rem;
    }

    /* progress bar for stock visual */
    .stock-bar-container {
      margin: 12px 0 8px;
      background: #e2e8f0;
      border-radius: 20px;
      height: 6px;
      overflow: hidden;
    }

    .stock-bar-fill {
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s ease;
    }

    .stock-bar-fill.high {
      background: linear-gradient(90deg, #10b981, #34d399);
    }
    .stock-bar-fill.medium {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
    }
    .stock-bar-fill.low {
      background: linear-gradient(90deg, #ef4444, #f87171);
    }

    .card-actions {
      display: flex;
      gap: 12px;
      margin-top: 1.2rem;
      padding-top: 0.8rem;
      border-top: 1px solid #f0f2f5;
    }

    .edit-card-btn, .delete-card-btn {
      flex: 1;
      border: none;
      padding: 8px 0;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .edit-card-btn {
      background: #eef2ff;
      color: #4f46e5;
    }
    .edit-card-btn:hover {
      background: #e0e7ff;
      transform: scale(0.96);
    }
    .delete-card-btn {
      background: #fef2f2;
      color: #dc2626;
    }
    .delete-card-btn:hover {
      background: #fee2e2;
      transform: scale(0.96);
    }

    /* Edit mode inside card */
    .edit-mode-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 12px 0;
    }
    .edit-input {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      font-size: 0.85rem;
      width: 100%;
    }
    .edit-input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(129,140,248,0.2);
    }
    .edit-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }
    .save-edit, .cancel-edit {
      flex: 1;
      padding: 8px;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .save-edit {
      background: #4f46e5;
      color: white;
    }
    .cancel-edit {
      background: #e2e8f0;
      color: #334155;
    }

    /* add product form */
    .form-card {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #eef2ff;
      transition: all 0.2s;
    }

    .form-title {
      font-weight: 700;
      margin-bottom: 1.2rem;
      font-size: 1.2rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .form-group {
      flex: 1 1 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5b6e8c;
    }

    .form-group input {
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 24px;
      font-size: 0.9rem;
      transition: 0.2s;
      background: #ffffff;
    }

    .form-group input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
    }

    .add-btn {
      background: linear-gradient(95deg, #4f46e5, #6366f1);
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3);
      font-size: 0.85rem;
    }

    .add-btn:hover {
      background: linear-gradient(95deg, #4338ca, #4f46e5);
      transform: scale(0.97);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      background: white;
      border-radius: 32px;
      color: #94a3b8;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      padding: 1rem;
      color: #64748b;
      font-size: 0.75rem;
    }

    @media (max-width: 720px) {
      #root {
        padding: 1rem;
      }
      .products-grid {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        gap: 1rem;
      }
      .product-form {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><span class="nav-brand"><span>📦</span> Inventory System</span></li>
      <li><a href="#dashboard">Dashboard</a></li>
      <li><a href="#products">Products</a></li>
      <li><a href="#settings">Settings</a></li>
      <li class="nav-spacer"></li>
      <li><button class="logout-btn" onclick="logout()">Logout</button></li>
    </ul>
  </nav>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // ---------- LOGIC: IDENTICAL TO ORIGINAL (NO CHANGES) ----------
    function logout() {
      localStorage.removeItem('token');
      alert('Logged out successfully!');
      window.location.href = '/login';
    }

    function checkAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Please login first');
        window.location.href = '/login';
      }
    }
    window.addEventListener('DOMContentLoaded', checkAuth);
    
    // ---------- REACT APP ----------
    const { useState, useEffect } = React;

    const generateId = () => Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    
    const initialProducts = [
      { id: '1', name: 'Wireless Headphones', category: 'Electronics', price: 79.99, stock: 42 },
      { id: '2', name: 'Ergonomic Keyboard', category: 'Electronics', price: 129.99, stock: 18 },
      { id: '3', name: 'Stainless Steel Water Bottle', category: 'Accessories', price: 24.99, stock: 120 },
      { id: '4', name: 'Desk Lamp', category: 'Furniture', price: 45.50, stock: 7 },
      { id: '5', name: 'Notebook Set', category: 'Stationery', price: 12.99, stock: 85 }
    ];

    const DashboardApp = () => {
      const [products, setProducts] = useState(() => {
        const saved = localStorage.getItem('dashboard_products');
        return saved ? JSON.parse(saved) : initialProducts;
      });
      const [newProduct, setNewProduct] = useState({ name: '', category: '', price: '', stock: '' });
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({ name: '', category: '', price: '', stock: '' });

      useEffect(() => {
        localStorage.setItem('dashboard_products', JSON.stringify(products));
      }, [products]);

      const totalProducts = products.length;
      const totalValue = products.reduce((sum, p) => sum + (p.price * p.stock), 0);
      const lowStockItems = products.filter(p => p.stock < 10).length;

      const handleInputChange = (e) => {
        setNewProduct({ ...newProduct, [e.target.name]: e.target.value });
      };

      const addProduct = () => {
        if (!newProduct.name || !newProduct.category || !newProduct.price || !newProduct.stock) {
          alert('Please fill all fields');
          return;
        }
        const priceNum = parseFloat(newProduct.price);
        const stockNum = parseInt(newProduct.stock, 10);
        if (isNaN(priceNum) || isNaN(stockNum) || priceNum <= 0 || stockNum < 0) {
          alert('Price must be positive number, stock non-negative');
          return;
        }
        const product = {
          id: generateId(),
          name: newProduct.name.trim(),
          category: newProduct.category.trim(),
          price: priceNum,
          stock: stockNum,
        };
        setProducts([...products, product]);
        setNewProduct({ name: '', category: '', price: '', stock: '' });
      };

      const deleteProduct = (id) => {
        if (window.confirm('Are you sure you want to delete this product?')) {
          setProducts(products.filter(p => p.id !== id));
          if (editingId === id) setEditingId(null);
        }
      };

      const startEdit = (product) => {
        setEditingId(product.id);
        setEditForm({
          name: product.name,
          category: product.category,
          price: product.price.toString(),
          stock: product.stock.toString(),
        });
      };

      const cancelEdit = () => {
        setEditingId(null);
        setEditForm({ name: '', category: '', price: '', stock: '' });
      };

      const saveEdit = (id) => {
        if (!editForm.name || !editForm.category || !editForm.price || !editForm.stock) {
          alert('All fields required');
          return;
        }
        const priceNum = parseFloat(editForm.price);
        const stockNum = parseInt(editForm.stock, 10);
        if (isNaN(priceNum) || isNaN(stockNum) || priceNum <= 0 || stockNum < 0) {
          alert('Invalid price or stock');
          return;
        }
        setProducts(products.map(p => p.id === id ? {
          ...p,
          name: editForm.name.trim(),
          category: editForm.category.trim(),
          price: priceNum,
          stock: stockNum,
        } : p));
        setEditingId(null);
        setEditForm({ name: '', category: '', price: '', stock: '' });
      };

      const getStockLevel = (stock) => {
        if (stock <= 5) return 'low';
        if (stock <= 20) return 'medium';
        return 'high';
      };

      const getStockPercent = (stock) => {
        const maxStock = 150;
        return Math.min(100, (stock / maxStock) * 100);
      };

      return (
        <div className="dashboard-container">
          <div className="welcome-banner">
            <div className="welcome-title">
              <span>✨</span> Product Dashboard
            </div>
            <div className="welcome-sub">
              Manage your inventory, track products, and monitor stock levels in real time.
            </div>
          </div>

          <div className="stats-grid">
            <div className="stat-card"><div className="stat-info"><h4>Total Products</h4><div className="stat-number">{totalProducts}</div></div><div className="stat-icon">📦</div></div>
            <div className="stat-card"><div className="stat-info"><h4>Inventory Value</h4><div className="stat-number">${totalValue.toFixed(2)}</div></div><div className="stat-icon">💰</div></div>
            <div className="stat-card"><div className="stat-info"><h4>Low Stock Items</h4><div className="stat-number">{lowStockItems}</div></div><div className="stat-icon">⚠️</div></div>
            <div className="stat-card"><div className="stat-info"><h4>Categories</h4><div className="stat-number">{new Set(products.map(p => p.category)).size}</div></div><div className="stat-icon">🏷️</div></div>
          </div>

          <div className="form-card">
            <div className="form-title"><span>➕</span> Add New Product</div>
            <div className="product-form">
              <div className="form-group"><label>Product Name</label><input type="text" name="name" placeholder="e.g. Smart Watch" value={newProduct.name} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Category</label><input type="text" name="category" placeholder="Electronics" value={newProduct.category} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Price ($)</label><input type="number" step="0.01" name="price" placeholder="0.00" value={newProduct.price} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Stock</label><input type="number" name="stock" placeholder="0" value={newProduct.stock} onChange={handleInputChange} /></div>
              <button className="add-btn" onClick={addProduct}>+ Add Product</button>
            </div>
          </div>

          <div className="products-section">
            <div className="section-header">
              <h2><span>📋</span> Products List</h2>
              <div className="product-count-badge">{products.length} items total</div>
            </div>
            
            {products.length === 0 ? (
              <div className="empty-state">✨ No products yet. Add your first product above!</div>
            ) : (
              <div className="products-grid">
                {products.map(product => {
                  const stockLevel = getStockLevel(product.stock);
                  const stockPercent = getStockPercent(product.stock);
                  const isEditing = editingId === product.id;
                  
                  if (isEditing) {
                    return (
                      <div key={product.id} className="product-card">
                        <div className="card-content">
                          <div className="edit-mode-fields">
                            <input className="edit-input" placeholder="Name" value={editForm.name} onChange={(e) => setEditForm({...editForm, name: e.target.value})} />
                            <input className="edit-input" placeholder="Category" value={editForm.category} onChange={(e) => setEditForm({...editForm, category: e.target.value})} />
                            <input className="edit-input" type="number" step="0.01" placeholder="Price" value={editForm.price} onChange={(e) => setEditForm({...editForm, price: e.target.value})} />
                            <input className="edit-input" type="number" placeholder="Stock" value={editForm.stock} onChange={(e) => setEditForm({...editForm, stock: e.target.value})} />
                            <div className="edit-actions">
                              <button className="save-edit" onClick={() => saveEdit(product.id)}>💾 Save</button>
                              <button className="cancel-edit" onClick={cancelEdit}>✖ Cancel</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  }
                  
                  return (
                    <div key={product.id} className="product-card">
                      <div className="card-content">
                        <div className="product-header">
                          <div className="product-name">{product.name}</div>
                          <div className="category-chip">📁 {product.category}</div>
                        </div>
                        <div className="product-details">
                          <div className="price-tag"><span>$</span> {product.price.toFixed(2)}</div>
                          <div className="stock-indicator">
                            <div className={`stock-badge-modern ${stockLevel}`}>
                              {stockLevel === 'high' && '🟢'} {stockLevel === 'medium' && '🟠'} {stockLevel === 'low' && '🔴'} 
                              <span className="stock-value">{product.stock} units</span>
                            </div>
                          </div>
                        </div>
                        <div className="stock-bar-container">
                          <div className={`stock-bar-fill ${stockLevel}`} style={{ width: `${stockPercent}%` }}></div>
                        </div>
                        <div className="card-actions">
                          <button className="edit-card-btn" onClick={() => startEdit(product)}>✏️ Edit</button>
                          <button className="delete-card-btn" onClick={() => deleteProduct(product.id)}>🗑 Delete</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <footer>🔐 Secure inventory management — modern product card view</footer>
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(rootElement);
    reactRoot.render(React.createElement(DashboardApp));
  </script>
</body>
</html>
